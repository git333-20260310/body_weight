<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>体重・食事・運動記録</title>
  <style>
    :root {
      --bg: #f6f1e7;
      --panel: rgba(255, 252, 246, 0.96);
      --panel-strong: #fffaf2;
      --line: #d7c8ae;
      --text: #2f2419;
      --sub: #6d5a48;
      --accent: #b85c38;
      --accent-strong: #924525;
      --soft: #efe3d0;
      --shadow: 0 10px 30px rgba(95, 64, 34, 0.12);
      --radius: 18px;
      --field-radius: 12px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 240, 214, 0.85), transparent 34%),
        linear-gradient(180deg, #f8f2e8 0%, #f2ebdf 100%);
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      line-height: 1.45;
      padding: env(safe-area-inset-top) 14px calc(28px + env(safe-area-inset-bottom));
    }

    .app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .hero {
      padding: 20px 18px 16px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255, 250, 239, 0.96), rgba(247, 236, 220, 0.96)),
        var(--panel);
      box-shadow: var(--shadow);
      border: 1px solid rgba(215, 200, 174, 0.8);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
    }

    .intro {
      margin: 0;
      color: var(--sub);
      font-size: 0.95rem;
    }

    .section {
      margin-top: 14px;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      border: 1px solid rgba(215, 200, 174, 0.75);
      backdrop-filter: blur(6px);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid.basic {
      grid-template-columns: 1fr;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label,
    .subsection-title,
    .row-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--sub);
    }

    .date-note {
      font-size: 0.82rem;
      color: var(--sub);
      min-height: 1.2em;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--field-radius);
      background: #fffdf9;
      color: var(--text);
      padding: 12px 12px;
      appearance: none;
      -webkit-appearance: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.14);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input[readonly] {
      background: #f6efe3;
      color: var(--accent-strong);
      font-weight: 700;
    }

    .weight-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .weight-label-group {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      gap: 8px;
    }

    .meal-block + .meal-block {
      margin-top: 18px;
    }

    .meal-block {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(215, 200, 174, 0.72);
      background: rgba(255, 251, 244, 0.72);
    }

    .meal-block-breakfast {
      background: linear-gradient(180deg, rgba(255, 248, 235, 0.96), rgba(255, 252, 246, 0.82));
    }

    .meal-block-lunch {
      background: linear-gradient(180deg, rgba(247, 242, 229, 0.96), rgba(255, 252, 246, 0.82));
    }

    .meal-block-dinner {
      background: linear-gradient(180deg, rgba(242, 236, 228, 0.96), rgba(255, 252, 246, 0.82));
    }

    .meal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(215, 200, 174, 0.72);
    }

    .meal-note {
      font-size: 0.82rem;
      color: var(--sub);
    }

    .meal-list {
      display: grid;
      gap: 10px;
    }

    .meal-row {
      display: grid;
      gap: 8px;
      align-items: start;
    }

    .meal-row input {
      min-width: 0;
    }

    .meal-row-picker {
      display: grid;
      gap: 4px;
      justify-items: start;
    }

    .meal-row-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px;
      gap: 8px;
      align-items: start;
    }

    .meal-row-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px 44px;
      gap: 8px;
      align-items: start;
    }

    .meal-row-picker-toggle {
      min-height: 36px;
      width: 36px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(215, 200, 174, 0.9);
      background: rgba(255, 253, 249, 0.85);
      color: var(--sub);
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: none;
    }

    .meal-row-picker-toggle::before {
      content: "+";
      display: block;
      line-height: 1;
      font-size: 1rem;
    }

    .meal-row-picker-toggle.is-open {
      background: var(--soft);
      color: var(--accent-strong);
      border-color: rgba(184, 92, 56, 0.35);
    }

    .meal-row-picker-toggle.is-open::before {
      content: "×";
    }

    .meal-row-picker-panel {
      width: 100%;
    }

    .meal-row-picker-panel[hidden] {
      display: none;
    }

    .meal-candidate-select {
      padding: 8px 12px;
      min-height: 38px;
      font-size: 0.88rem;
      color: var(--sub);
      background: rgba(255, 253, 249, 0.72);
      border-color: rgba(215, 200, 174, 0.72);
      box-shadow: none;
    }

    .meal-add-row {
      margin-top: 10px;
      width: 100%;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px dashed rgba(184, 92, 56, 0.38);
      background: rgba(255, 249, 241, 0.72);
      color: var(--accent-strong);
      box-shadow: none;
    }

    .meal-remove-row {
      min-height: 44px;
      width: 44px;
      padding: 0;
      border-radius: 12px;
      border: 1px solid rgba(184, 92, 56, 0.28);
      background: #fff1eb;
      color: #a14425;
      box-shadow: none;
      font-size: 1rem;
      line-height: 1;
    }

    .meal-memory-panel {
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 249, 241, 0.9);
      border: 1px solid rgba(215, 200, 174, 0.9);
    }

    .meal-memory-title {
      margin: 0 0 4px;
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .meal-memory-copy {
      margin: 0 0 12px;
      font-size: 0.84rem;
      color: var(--sub);
    }

    .meal-memory-editor {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fffdf8;
      border: 1px solid var(--line);
    }

    .meal-memory-editor[hidden] {
      display: none;
    }

    .meal-memory-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .meal-memory-list {
      display: grid;
      gap: 8px;
    }

    .meal-memory-empty {
      padding: 12px;
      border-radius: 12px;
      background: rgba(239, 227, 208, 0.7);
      color: var(--sub);
      font-size: 0.84rem;
    }

    .meal-memory-item {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 14px;
      background: #fffdf9;
      border: 1px solid rgba(215, 200, 174, 0.9);
    }

    .meal-memory-content {
      font-weight: 700;
      word-break: break-word;
    }

    .meal-memory-meta {
      font-size: 0.8rem;
      color: var(--sub);
    }

    .meal-memory-item-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .button-small {
      min-height: 42px;
      padding: 11px 12px;
      border-radius: 12px;
    }

    .danger {
      background: #fff1eb;
      color: #a14425;
      border: 1px solid rgba(184, 92, 56, 0.28);
    }

    .total-wrap {
      margin-top: 18px;
      padding: 12px;
      border-radius: 14px;
      background: var(--soft);
    }

    .actions {
      margin-top: 18px;
      padding-top: 4px;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
    }

    .primary {
      background: linear-gradient(135deg, #c86d45, #a74f2e);
      color: #fff;
      box-shadow: 0 10px 18px rgba(167, 79, 46, 0.22);
    }

    .secondary {
      background: #fff9f1;
      color: var(--accent-strong);
      border: 1px solid var(--line);
    }

    .status {
      margin-top: 10px;
      min-height: 1.2em;
      color: var(--sub);
      font-size: 0.88rem;
    }

    .output {
      margin-top: 12px;
    }

    .output textarea {
      min-height: 280px;
      white-space: pre-wrap;
    }

    @media (min-width: 640px) {
      body {
        padding-left: 18px;
        padding-right: 18px;
      }

      .grid.basic {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field.full {
        grid-column: 1 / -1;
      }
      
      .weight-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>毎日の記録</h1>
      <p class="intro">日付・体重・食事・運動をそのまま埋めて、最後に完成文をコピーできます。</p>
    </section>

    <section class="section">
      <h2 class="section-title">基本項目</h2>
      <div class="grid basic">
        <div class="field">
          <label for="record-date">日付</label>
          <input id="record-date" data-key="date" type="date" inputmode="numeric">
          <div class="date-note" id="record-date-note"></div>
        </div>
        <div class="field">
          <label for="height">身長(cm)</label>
          <input id="height" data-key="height" type="text" inputmode="decimal" placeholder="172">
        </div>
        <div class="field full">
          <div class="row-label">体重(kg)</div>
          <div class="weight-grid">
            <input data-key="weight0Value" type="text" inputmode="decimal" placeholder="63.5" aria-label="体重1 数値">
            <div class="weight-label-group">
              <div class="field">
                <input id="weight0-date" data-key="weight0Date" type="date" inputmode="numeric" aria-label="体重1 日付">
                <div class="date-note" id="weight0-date-note"></div>
              </div>
              <select id="weight0-period" data-key="weight0Period" aria-label="体重1 時間帯">
                <option value="朝">朝</option>
                <option value="昼">昼</option>
              </select>
            </div>
            <input data-key="weight1Value" type="text" inputmode="decimal" placeholder="63.5" aria-label="体重2 数値">
            <div class="weight-label-group">
              <div class="field">
                <input id="weight1-date" data-key="weight1Date" type="date" inputmode="numeric" aria-label="体重2 日付">
                <div class="date-note" id="weight1-date-note"></div>
              </div>
              <select id="weight1-period" data-key="weight1Period" aria-label="体重2 時間帯">
                <option value="朝">朝</option>
                <option value="昼">昼</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">食事</h2>
      <div id="meals-root"></div>
      <div class="total-wrap">
        <div class="field">
          <label for="total-kcal">kcal合計</label>
          <input id="total-kcal" type="text" readonly value="0">
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">運動と活動</h2>
      <div class="grid">
        <div class="field">
          <label for="commute">通勤</label>
          <input id="commute" data-key="commute" type="text">
        </div>
        <div class="field">
          <label for="exercise">運動した内容</label>
          <textarea id="exercise" data-key="exercise"></textarea>
        </div>
      </div>
    </section>

    <section class="actions">
      <div class="button-row">
        <button class="primary" id="generate-button" type="button">テキスト生成</button>
        <button class="secondary" id="copy-button" type="button">コピー</button>
      </div>
      <div class="status" id="status"></div>
      <div class="output">
        <div class="field">
          <label for="output-text">完成テキスト</label>
          <textarea id="output-text" readonly></textarea>
        </div>
      </div>
      <div class="meal-memory-panel">
        <div class="meal-memory-title">よく使う食事</div>
        <p class="meal-memory-copy">入力した内容は自動保存され、使用回数が多い順に候補へ出ます。</p>
        <div class="meal-memory-editor" id="meal-memory-editor" hidden>
          <div class="field">
            <label for="meal-memory-content">食事内容を編集</label>
            <input id="meal-memory-content" type="text" placeholder="例: 納豆ごはん">
          </div>
          <div class="field">
            <label for="meal-memory-kcal">kcal</label>
            <input id="meal-memory-kcal" type="text" inputmode="decimal" placeholder="例: 320">
          </div>
          <div class="meal-memory-actions">
            <button class="primary button-small" id="meal-memory-save" type="button">保存</button>
            <button class="secondary button-small" id="meal-memory-cancel" type="button">キャンセル</button>
          </div>
        </div>
        <div class="meal-memory-list" id="meal-memory-list"></div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var storageKey = "bodyWeightRecordApp_v1";
      var historyStorageKey = "bodyWeightRecordHistory_v1";
      var mealMemoryStorageKey = "bodyWeightMealMemory_v1";
      var mealDayHistoryStorageKey = "bodyWeightMealDayHistory_v1";
      var maxMealCandidates = 12;
      var jstTimeZone = "Asia/Tokyo";
      var defaultData = {
        date: "",
        height: "172",
        weight0Value: "",
        weight0Date: "",
        weight0Period: "朝",
        weight0Label: "",
        weight1Value: "",
        weight1Date: "",
        weight1Period: "朝",
        weight1Label: "",
        commute: "4km(通勤往復)+7階まで階段",
        exercise: "クランチ200回+スクワット20回+5kgダンベル×２個を100回(色んな上げ方)+ストレッチ数分",
        outputText: "",
        meals: {
          breakfast: [
            { content: "核酸25ml", kcal: "20" },
            { content: "ソイプロテイン10g水150ccきな粉5g＋緑茶10cc蜂蜜20gごま10gクエン酸5cc重曹1ccシナモン少々", kcal: "180" },
            { content: "かぼちゃ", kcal: "30" },
            { content: "玉ねぎと温玉と納豆とめかぶと木綿豆腐のサラダに玉ねぎポン酢", kcal: "300" },
            { content: "", kcal: "" },
            { content: "チョコクロワッサン", kcal: "340" },
            { content: "", kcal: "" }
          ],
          lunch: [
            { content: "水550ml", kcal: "0" },
            { content: "", kcal: "" },
            { content: "", kcal: "" },
            { content: "", kcal: "" },
            { content: "", kcal: "" }
          ],
          dinner: [
            { content: "核酸25ml", kcal: "20" },
            { content: "ミニトマト", kcal: "30" },
            { content: "刺身：", kcal: "165" },
            { content: "スープ：", kcal: "105" },
            { content: "", kcal: "" },
            { content: "サラダ：大根、きゅうり、紫キャベツ、人参、水菜、めかぶ", kcal: "30" },
            { content: "", kcal: "" },
            { content: "", kcal: "" },
            { content: "", kcal: "" },
            { content: "りんご", kcal: "75" },
            { content: "", kcal: "" },
            { content: "あったかい麦茶200ml×2", kcal: "0" }
          ]
        }
      };

      var mealConfig = [
        { key: "breakfast", label: "朝" },
        { key: "lunch", label: "昼" },
        { key: "dinner", label: "夜" }
      ];

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      function getJstDateParts(baseDate) {
        var formatter = new Intl.DateTimeFormat("ja-JP", {
          timeZone: jstTimeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          weekday: "short"
        });
        var parts = formatter.formatToParts(baseDate || new Date());
        var map = {};

        parts.forEach(function (part) {
          if (part.type !== "literal") {
            map[part.type] = part.value;
          }
        });

        return map;
      }

      function getJstTodayInputValue() {
        var parts = getJstDateParts(new Date());
        var hour = Number(parts.hour || "0");
        var baseDate;

        if (hour < 13) {
          baseDate = new Date(Number(parts.year), Number(parts.month) - 1, Number(parts.day));
          baseDate.setDate(baseDate.getDate() - 1);
          return formatDateInput(baseDate);
        }

        return [parts.year, parts.month, parts.day].join("-");
      }

      function parseDateInput(value) {
        var match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!match) {
          return null;
        }

        var date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
        if (
          date.getFullYear() !== Number(match[1]) ||
          date.getMonth() !== Number(match[2]) - 1 ||
          date.getDate() !== Number(match[3])
        ) {
          return null;
        }

        return date;
      }

      function formatDateInput(date) {
        if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
          return "";
        }
        return [
          date.getFullYear(),
          pad2(date.getMonth() + 1),
          pad2(date.getDate())
        ].join("-");
      }

      function formatDateWithWeekday(dateText) {
        var date = parseDateInput(dateText);
        var weekdayLabels = ["日", "月", "火", "水", "木", "金", "土"];

        if (!date) {
          return "";
        }

        return [
          date.getFullYear(),
          "/",
          pad2(date.getMonth() + 1),
          "/",
          pad2(date.getDate()),
          "(",
          weekdayLabels[date.getDay()],
          ")"
        ].join("");
      }

      function addDays(dateText, days) {
        var date = parseDateInput(dateText);
        if (!date) {
          return "";
        }
        date.setDate(date.getDate() + days);
        return formatDateInput(date);
      }

      function normalizePeriod(value) {
        return value === "昼" ? "昼" : "朝";
      }

      function inferWeightDate(label, fallbackDate) {
        var match = String(label || "").trim().match(/^(\d{1,2})(朝|昼)$/);
        if (!match) {
          return fallbackDate;
        }

        var base = parseDateInput(fallbackDate);
        if (!base) {
          return fallbackDate;
        }

        var day = Number(match[1]);
        var candidate = new Date(base.getFullYear(), base.getMonth(), day);

        if (candidate.getDate() !== day) {
          return fallbackDate;
        }

        if (day < base.getDate() - 15) {
          candidate = new Date(base.getFullYear(), base.getMonth() + 1, day);
        } else if (day > base.getDate() + 15) {
          candidate = new Date(base.getFullYear(), base.getMonth() - 1, day);
        }

        return formatDateInput(candidate);
      }

      function inferWeightPeriod(label, fallbackPeriod) {
        var trimmed = String(label || "").trim();
        if (/昼$/.test(trimmed)) {
          return "昼";
        }
        if (/朝$/.test(trimmed)) {
          return "朝";
        }
        return normalizePeriod(fallbackPeriod);
      }

      function syncDerivedWeightLabels() {
        state.weight0Label = formatWeightLabel(state.weight0Date, state.weight0Period);
        state.weight1Label = formatWeightLabel(state.weight1Date, state.weight1Period);
      }

      function ensureWeightFields() {
        state.weight0Date = state.weight0Date || inferWeightDate(state.weight0Label, state.date);
        state.weight0Period = inferWeightPeriod(state.weight0Label, state.weight0Period || "朝");
        state.weight1Date = state.weight1Date || inferWeightDate(state.weight1Label, addDays(state.date, 1) || state.date);
        state.weight1Period = inferWeightPeriod(state.weight1Label, state.weight1Period || "朝");
        syncDerivedWeightLabels();
      }

      function loadHistory() {
        try {
          var raw = localStorage.getItem(historyStorageKey);
          if (!raw) {
            return {};
          }

          var parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (error) {
          return {};
        }
      }

      function loadMealDayHistory() {
        try {
          var raw = localStorage.getItem(mealDayHistoryStorageKey);
          if (!raw) {
            return {};
          }

          var parsed = JSON.parse(raw);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (error) {
          return {};
        }
      }

      function mergeData(base, saved) {
        var merged = deepClone(base);
        if (!saved || typeof saved !== "object") {
          return merged;
        }

        Object.keys(merged).forEach(function (key) {
          if (key === "meals") {
            return;
          }
          if (typeof saved[key] === "string") {
            merged[key] = saved[key];
          }
        });

        if (saved.meals && typeof saved.meals === "object") {
          mealConfig.forEach(function (meal) {
            if (Array.isArray(saved.meals[meal.key])) {
              merged.meals[meal.key] = saved.meals[meal.key].map(function (savedItem, index) {
                var baseItem = base.meals[meal.key][index] || { content: "", kcal: "" };
                if (!savedItem || typeof savedItem !== "object") {
                  return baseItem;
                }
                return {
                  content: typeof savedItem.content === "string" ? savedItem.content : baseItem.content,
                  kcal: typeof savedItem.kcal === "string" ? savedItem.kcal : baseItem.kcal
                };
              });

              if (
                meal.key === "breakfast" &&
                merged.meals[meal.key].length > 1
              ) {
                var lastBreakfastItem = merged.meals[meal.key][merged.meals[meal.key].length - 1];
                if (
                  lastBreakfastItem &&
                  !String(lastBreakfastItem.content || "").trim() &&
                  !String(lastBreakfastItem.kcal || "").trim()
                ) {
                  merged.meals[meal.key].pop();
                }
              }

              if (meal.key === "dinner") {
                var appleIndex = merged.meals[meal.key].findIndex(function (item) {
                  return item && String(item.content || "").trim() === "りんご";
                });

                if (appleIndex > 0) {
                  var beforeAppleItem = merged.meals[meal.key][appleIndex - 1];
                  if (
                    beforeAppleItem &&
                    !String(beforeAppleItem.content || "").trim() &&
                    !String(beforeAppleItem.kcal || "").trim()
                  ) {
                    merged.meals[meal.key].splice(appleIndex - 1, 1);
                    appleIndex -= 1;
                  }
                }

                if (appleIndex >= 0 && appleIndex < merged.meals[meal.key].length - 1) {
                  var afterAppleItem = merged.meals[meal.key][appleIndex + 1];
                  if (
                    afterAppleItem &&
                    !String(afterAppleItem.content || "").trim() &&
                    !String(afterAppleItem.kcal || "").trim()
                  ) {
                    merged.meals[meal.key].splice(appleIndex + 1, 1);
                  }
                }
              }
            }
          });
        }

        return merged;
      }

      function loadState() {
        try {
          var raw = localStorage.getItem(storageKey);
          if (!raw) {
            return deepClone(defaultData);
          }
          return mergeData(defaultData, JSON.parse(raw));
        } catch (error) {
          return deepClone(defaultData);
        }
      }

      function normalizeMealContent(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function normalizeMealKcal(value) {
        return String(value || "").trim();
      }

      function createEmptyMealItem() {
        return { content: "", kcal: "" };
      }

      function normalizeMealItem(item) {
        if (!item || typeof item !== "object") {
          return createEmptyMealItem();
        }

        return {
          content: typeof item.content === "string" ? item.content : "",
          kcal: typeof item.kcal === "string" ? item.kcal : ""
        };
      }

      function hasMealItemValue(item) {
        return Boolean(normalizeMealContent(item.content) || normalizeMealKcal(item.kcal));
      }

      function normalizeMealRows(items) {
        var normalized = Array.isArray(items) ? items.map(normalizeMealItem) : [];

        while (normalized.length && !hasMealItemValue(normalized[normalized.length - 1])) {
          normalized.pop();
        }

        normalized.push(createEmptyMealItem());
        return normalized;
      }

      function normalizeMealsCollection(meals) {
        var nextMeals = {};

        mealConfig.forEach(function (meal) {
          nextMeals[meal.key] = normalizeMealRows(meals && meals[meal.key]);
        });

        return nextMeals;
      }

      function pruneTargetedMealBlanks(meals) {
        var nextMeals = deepClone(meals || {});
        var breakfastItems = Array.isArray(nextMeals.breakfast) ? nextMeals.breakfast : [];
        var dinnerItems = Array.isArray(nextMeals.dinner) ? nextMeals.dinner : [];
        var appleIndex;
        var saladIndex;

        if (breakfastItems.length > 1) {
          var lastBreakfastItem = breakfastItems[breakfastItems.length - 1];
          if (
            lastBreakfastItem &&
            !String(lastBreakfastItem.content || "").trim() &&
            !String(lastBreakfastItem.kcal || "").trim()
          ) {
            breakfastItems.pop();
          }
        }

        if (dinnerItems.length) {
          saladIndex = dinnerItems.findIndex(function (item) {
            return item && String(item.content || "").trim() === "サラダ：大根、きゅうり、紫キャベツ、人参、水菜、めかぶ";
          });

          appleIndex = dinnerItems.findIndex(function (item) {
            return item && String(item.content || "").trim() === "りんご";
          });
          var warmTeaIndex = dinnerItems.findIndex(function (item) {
            return item && String(item.content || "").trim() === "あったかい麦茶200ml×2";
          });

          if (saladIndex >= 0 && appleIndex > saladIndex) {
            var betweenItems = dinnerItems.slice(saladIndex + 1, appleIndex);
            dinnerItems.splice(
              saladIndex + 1,
              betweenItems.length,
              createEmptyMealItem(),
              createEmptyMealItem()
            );
            appleIndex = saladIndex + 3;
          }

          if (appleIndex >= 0 && appleIndex < dinnerItems.length - 1) {
            var afterAppleItem = dinnerItems[appleIndex + 1];
            if (
              afterAppleItem &&
              !String(afterAppleItem.content || "").trim() &&
              !String(afterAppleItem.kcal || "").trim()
            ) {
              dinnerItems.splice(appleIndex + 1, 1);
            }
          }

          if (warmTeaIndex >= 0 && warmTeaIndex < dinnerItems.length - 1) {
            var afterWarmTeaItem = dinnerItems[warmTeaIndex + 1];
            if (
              afterWarmTeaItem &&
              !String(afterWarmTeaItem.content || "").trim() &&
              !String(afterWarmTeaItem.kcal || "").trim()
            ) {
              dinnerItems.splice(warmTeaIndex + 1, 1);
            }
          }
        }

        nextMeals.breakfast = breakfastItems;
        nextMeals.dinner = dinnerItems;
        return nextMeals;
      }

      function cloneMeals(meals) {
        return deepClone(meals || {});
      }

      function hasAnyMealContent(meals) {
        return mealConfig.some(function (meal) {
          return (meals && meals[meal.key] || []).some(hasMealItemValue);
        });
      }

      function saveMealDayHistory() {
        if (!state.date) {
          return;
        }

        mealDayHistory[state.date] = pruneTargetedMealBlanks(normalizeMealsCollection(state.meals));
        localStorage.setItem(mealDayHistoryStorageKey, JSON.stringify(mealDayHistory));
      }

      function getMealsForCarryOver(targetDate, previousStateDate, previousMeals) {
        var previousDate = addDays(targetDate, -1);
        var saved = mealDayHistory[previousDate];

        if (previousStateDate === previousDate && hasAnyMealContent(previousMeals)) {
          return pruneTargetedMealBlanks(normalizeMealsCollection(previousMeals));
        }

        if (saved && hasAnyMealContent(saved)) {
          return pruneTargetedMealBlanks(normalizeMealsCollection(saved));
        }

        return pruneTargetedMealBlanks(normalizeMealsCollection(defaultData.meals));
      }

      function createMealMemoryId() {
        return "meal_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }

      function sortMealMemoryList(list) {
        return list.sort(function (a, b) {
          if ((b.count || 0) !== (a.count || 0)) {
            return (b.count || 0) - (a.count || 0);
          }
          if ((b.updatedAt || 0) !== (a.updatedAt || 0)) {
            return (b.updatedAt || 0) - (a.updatedAt || 0);
          }
          return a.content.localeCompare(b.content, "ja");
        });
      }

      function normalizeMealMemoryItem(item) {
        var content = normalizeMealContent(item && item.content);
        if (!content) {
          return null;
        }

        return {
          id: typeof item.id === "string" && item.id ? item.id : createMealMemoryId(),
          content: content,
          kcal: normalizeMealKcal(item.kcal),
          count: Math.max(1, Number(item.count) || 1),
          updatedAt: Number(item.updatedAt) || Date.now()
        };
      }

      function loadMealMemory() {
        try {
          var raw = localStorage.getItem(mealMemoryStorageKey);
          if (!raw) {
            return [];
          }

          var parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) {
            return [];
          }

          var mergedMap = {};
          parsed.forEach(function (item) {
            var normalized = normalizeMealMemoryItem(item);
            var key;
            if (!normalized) {
              return;
            }

            key = normalized.content;
            if (!mergedMap[key]) {
              mergedMap[key] = normalized;
              return;
            }

            mergedMap[key].count += normalized.count;
            if (normalized.updatedAt >= mergedMap[key].updatedAt) {
              mergedMap[key].kcal = normalized.kcal;
              mergedMap[key].updatedAt = normalized.updatedAt;
            }
          });

          return sortMealMemoryList(Object.keys(mergedMap).map(function (key) {
            return mergedMap[key];
          }));
        } catch (error) {
          return [];
        }
      }

      function saveMealMemory() {
        localStorage.setItem(mealMemoryStorageKey, JSON.stringify(sortMealMemoryList(mealMemory.slice())));
      }

      function seedMealMemoryFromState() {
        var seeded = [];
        mealConfig.forEach(function (meal) {
          state.meals[meal.key].forEach(function (item) {
            var content = normalizeMealContent(item.content);
            var kcal = normalizeMealKcal(item.kcal);
            var existing;

            if (!content) {
              return;
            }

            existing = seeded.find(function (entry) {
              return entry.content === content;
            });

            if (existing) {
              existing.count += 1;
              if (kcal) {
                existing.kcal = kcal;
              }
              existing.updatedAt = Date.now();
              return;
            }

            seeded.push({
              id: createMealMemoryId(),
              content: content,
              kcal: kcal,
              count: 1,
              updatedAt: Date.now()
            });
          });
        });

        return sortMealMemoryList(seeded);
      }

      function findMealMemoryById(id) {
        return mealMemory.find(function (item) {
          return item.id === id;
        }) || null;
      }

      function findMealMemoryByContent(content, excludeId) {
        var normalizedContent = normalizeMealContent(content);
        return mealMemory.find(function (item) {
          return item.id !== excludeId && item.content === normalizedContent;
        }) || null;
      }

      function upsertMealMemory(content, kcal, options) {
        var normalizedContent = normalizeMealContent(content);
        var normalizedKcal = normalizeMealKcal(kcal);
        var settings = options || {};
        var existing;
        var now;
        var nextCount;

        if (!normalizedContent) {
          return null;
        }

        existing = findMealMemoryByContent(normalizedContent);
        now = Date.now();

        if (existing) {
          nextCount = settings.increment ? (existing.count || 0) + 1 : (existing.count || 0);
          existing.count = Math.max(1, nextCount);
          if (normalizedKcal || !existing.kcal) {
            existing.kcal = normalizedKcal;
          }
          existing.updatedAt = now;
          saveMealMemory();
          return existing;
        }

        existing = {
          id: createMealMemoryId(),
          content: normalizedContent,
          kcal: normalizedKcal,
          count: Math.max(1, settings.increment ? 1 : 1),
          updatedAt: now
        };

        mealMemory.push(existing);
        saveMealMemory();
        return existing;
      }

      function deleteMealMemory(id) {
        mealMemory = mealMemory.filter(function (item) {
          return item.id !== id;
        });
        saveMealMemory();
      }

      function getMealRowToken(mealKey, rowIndex) {
        return mealKey + ":" + rowIndex;
      }

      function getMealRowSignature(content, kcal) {
        var normalizedContent = normalizeMealContent(content);
        if (!normalizedContent) {
          return "";
        }
        return normalizedContent + "||" + normalizeMealKcal(kcal);
      }

      function buildMealCommitMap() {
        var map = {};
        mealConfig.forEach(function (meal) {
          state.meals[meal.key].forEach(function (item, index) {
            map[getMealRowToken(meal.key, index)] = getMealRowSignature(item.content, item.kcal);
          });
        });
        return map;
      }

      var state = loadState();
      state.meals = pruneTargetedMealBlanks(state.meals);
      var history = loadHistory();
      var mealDayHistory = loadMealDayHistory();
      var mealMemory = loadMealMemory();
      var editingMealMemoryId = "";
      applyAutoDatesAndWeights();
      ensureWeightFields();
      if (!mealMemory.length) {
        mealMemory = seedMealMemoryFromState();
        saveMealMemory();
      }
      var mealCommitMap = buildMealCommitMap();
      var statusEl = document.getElementById("status");
      var mealsRoot = document.getElementById("meals-root");
      var totalKcalEl = document.getElementById("total-kcal");
      var outputEl = document.getElementById("output-text");
      var mealMemoryListEl = document.getElementById("meal-memory-list");
      var mealMemoryEditorEl = document.getElementById("meal-memory-editor");
      var mealMemoryContentEl = document.getElementById("meal-memory-content");
      var mealMemoryKcalEl = document.getElementById("meal-memory-kcal");

      function setStatus(message) {
        statusEl.textContent = message || "";
      }

      function saveState() {
        try {
          syncDerivedWeightLabels();
          state.meals = pruneTargetedMealBlanks(state.meals);
          localStorage.setItem(storageKey, JSON.stringify(state));
          updateHistory();
          saveMealDayHistory();
          setStatus("自動保存しました");
        } catch (error) {
          setStatus("保存に失敗しました");
        }
      }

      function updateHistory() {
        if (!state.date) {
          return;
        }

        history[state.date] = {
          weight0Value: state.weight0Value,
          weight0Date: state.weight0Date,
          weight0Period: state.weight0Period,
          weight1Value: state.weight1Value,
          weight1Date: state.weight1Date,
          weight1Period: state.weight1Period
        };

        localStorage.setItem(historyStorageKey, JSON.stringify(history));
      }

      function findPreviousWeightValue(targetDate) {
        var previousRecord = history[addDays(targetDate, -1)];

        if (previousRecord && previousRecord.weight1Date === targetDate && String(previousRecord.weight1Value || "").trim()) {
          return previousRecord.weight1Value;
        }

        if (previousRecord && previousRecord.weight0Date === targetDate && String(previousRecord.weight0Value || "").trim()) {
          return previousRecord.weight0Value;
        }

        return "";
      }

      function applyAutoDatesAndWeights() {
        var today = getJstTodayInputValue();
        var tomorrow = addDays(today, 1);
        var shouldRefreshDates = !state.date || state.date !== today;
        var previousStateDate = state.date;
        var previousMeals = cloneMeals(state.meals);

        if (shouldRefreshDates) {
          state.date = today;
          state.weight0Date = today;
          state.weight1Date = tomorrow;
          state.weight0Period = "朝";
          state.weight1Period = "朝";
          state.weight0Value = findPreviousWeightValue(today);
          state.weight1Value = "";
          state.outputText = "";
          state.meals = getMealsForCarryOver(today, previousStateDate, previousMeals);
        } else {
          state.weight0Date = state.weight0Date || today;
          state.weight1Date = state.weight1Date || tomorrow;

          if (!String(state.weight0Value || "").trim()) {
            state.weight0Value = findPreviousWeightValue(today);
          }

        }

        syncDerivedWeightLabels();
        state.meals = pruneTargetedMealBlanks(state.meals);
      }

      function parseKcal(value) {
        var text = String(value || "").trim();
        if (!text) {
          return 0;
        }
        var match = text.match(/-?\d+(\.\d+)?/);
        return match ? Number(match[0]) : 0;
      }

      function updateTotalKcal() {
        var total = 0;
        mealConfig.forEach(function (meal) {
          state.meals[meal.key].forEach(function (item) {
            total += parseKcal(item.kcal);
          });
        });
        var display = Number.isInteger(total) ? String(total) : String(total);
        totalKcalEl.value = display;
        return display;
      }

      function updateWeightFieldInputs() {
        var weight0DateEl = document.getElementById("weight0-date");
        var weight1DateEl = document.getElementById("weight1-date");
        var weight0PeriodEl = document.getElementById("weight0-period");
        var weight1PeriodEl = document.getElementById("weight1-period");

        if (weight0DateEl) {
          weight0DateEl.value = state.weight0Date || "";
        }
        if (weight1DateEl) {
          weight1DateEl.value = state.weight1Date || "";
        }
        if (weight0PeriodEl) {
          weight0PeriodEl.value = normalizePeriod(state.weight0Period);
        }
        if (weight1PeriodEl) {
          weight1PeriodEl.value = normalizePeriod(state.weight1Period);
        }

        updateDateNotes();
      }

      function updateDateNotes() {
        var notes = [
          { id: "record-date-note", value: state.date },
          { id: "weight0-date-note", value: state.weight0Date },
          { id: "weight1-date-note", value: state.weight1Date }
        ];

        notes.forEach(function (item) {
          var noteEl = document.getElementById(item.id);
          if (noteEl) {
            noteEl.textContent = formatDateWithWeekday(item.value);
          }
        });
      }

      function syncWeightDatesWithRecordDate(previousDate, nextDate) {
        var previousSecondDate = addDays(previousDate, 1);
        var nextSecondDate = addDays(nextDate, 1);

        if (!state.weight0Date || state.weight0Date === previousDate) {
          state.weight0Date = nextDate;
        }

        if (!state.weight1Date || state.weight1Date === previousSecondDate) {
          state.weight1Date = nextSecondDate || nextDate;
        }

        syncDerivedWeightLabels();
        updateWeightFieldInputs();
      }

      function bindSimpleFields() {
        var nodes = document.querySelectorAll("[data-key]");
        nodes.forEach(function (node) {
          var key = node.getAttribute("data-key");
          if (!Object.prototype.hasOwnProperty.call(state, key)) {
            return;
          }
          node.value = state[key];
          var handleUpdate = function () {
            var previousDate = key === "date" ? state.date : "";
            state[key] = node.value;
            if (key === "date") {
              syncWeightDatesWithRecordDate(previousDate, state.date);
              if (!String(state.weight0Value || "").trim()) {
                state.weight0Value = findPreviousWeightValue(state.date);
              }
            }
            if (key === "weight0Period" || key === "weight1Period") {
              state[key] = normalizePeriod(state[key]);
            }
            saveState();
          };
          node.addEventListener("input", handleUpdate);
          node.addEventListener("change", handleUpdate);
        });
      }

      function getMealMemoryOptions() {
        return sortMealMemoryList(mealMemory.slice());
      }

      function populateMealCandidateSelect(selectEl, currentContent) {
        var options = getMealMemoryOptions().slice(0, maxMealCandidates);
        var matched = findMealMemoryByContent(currentContent);
        var matchedInTop = matched && options.some(function (item) {
          return item.id === matched.id;
        });

        selectEl.innerHTML = "";

        var placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "候補から選択";
        selectEl.appendChild(placeholder);

        options.forEach(function (item) {
          var option = document.createElement("option");
          option.value = item.id;
          option.textContent = item.content + (item.kcal ? " / " + item.kcal + "kcal" : "");
          selectEl.appendChild(option);
        });

        if (matched && !matchedInTop) {
          var currentOption = document.createElement("option");
          currentOption.value = matched.id;
          currentOption.textContent = matched.content + (matched.kcal ? " / " + matched.kcal + "kcal" : "");
          selectEl.appendChild(currentOption);
        }

        selectEl.value = matched ? matched.id : "";
      }

      function refreshMealCandidateSelects() {
        var selects = document.querySelectorAll(".meal-candidate-select");
        selects.forEach(function (selectEl) {
          var mealKey = selectEl.getAttribute("data-meal-key");
          var rowIndex = Number(selectEl.getAttribute("data-row-index"));
          var currentItem = state.meals[mealKey] && state.meals[mealKey][rowIndex];
          populateMealCandidateSelect(selectEl, currentItem ? currentItem.content : "");
        });
      }

      function syncMealMemoryFromRow(mealKey, rowIndex, options) {
        var item = state.meals[mealKey][rowIndex];
        var token = getMealRowToken(mealKey, rowIndex);
        var nextSignature = getMealRowSignature(item.content, item.kcal);
        var previousSignature = mealCommitMap[token] || "";
        var settings = options || {};
        var shouldIncrement = Boolean(settings.increment && nextSignature && nextSignature !== previousSignature);

        if (!nextSignature) {
          mealCommitMap[token] = "";
          return null;
        }

        mealCommitMap[token] = nextSignature;
        return upsertMealMemory(item.content, item.kcal, { increment: shouldIncrement });
      }

      function startMealMemoryEdit(id) {
        var target = findMealMemoryById(id);
        if (!target) {
          return;
        }

        editingMealMemoryId = id;
        mealMemoryContentEl.value = target.content;
        mealMemoryKcalEl.value = target.kcal;
        mealMemoryEditorEl.hidden = false;
        mealMemoryContentEl.focus();
      }

      function stopMealMemoryEdit() {
        editingMealMemoryId = "";
        mealMemoryContentEl.value = "";
        mealMemoryKcalEl.value = "";
        mealMemoryEditorEl.hidden = true;
      }

      function saveMealMemoryEdit() {
        var target = findMealMemoryById(editingMealMemoryId);
        var normalizedContent;
        var normalizedKcal;
        var duplicate;

        if (!target) {
          stopMealMemoryEdit();
          return;
        }

        normalizedContent = normalizeMealContent(mealMemoryContentEl.value);
        normalizedKcal = normalizeMealKcal(mealMemoryKcalEl.value);

        if (!normalizedContent) {
          setStatus("食事内容を入力してください");
          mealMemoryContentEl.focus();
          return;
        }

        duplicate = findMealMemoryByContent(normalizedContent, target.id);

        if (duplicate) {
          duplicate.count += target.count;
          duplicate.kcal = normalizedKcal || duplicate.kcal;
          duplicate.updatedAt = Date.now();
          deleteMealMemory(target.id);
        } else {
          target.content = normalizedContent;
          target.kcal = normalizedKcal;
          target.updatedAt = Date.now();
          saveMealMemory();
        }

        stopMealMemoryEdit();
        renderMealMemoryList();
        refreshMealCandidateSelects();
        setStatus("よく使う食事を更新しました");
      }

      function renderMealMemoryList() {
        var items = getMealMemoryOptions();
        mealMemoryListEl.innerHTML = "";

        if (!items.length) {
          var emptyEl = document.createElement("div");
          emptyEl.className = "meal-memory-empty";
          emptyEl.textContent = "食事内容を入力すると、ここに候補がたまります。";
          mealMemoryListEl.appendChild(emptyEl);
          return;
        }

        items.forEach(function (item) {
          var card = document.createElement("div");
          card.className = "meal-memory-item";

          var contentEl = document.createElement("div");
          contentEl.className = "meal-memory-content";
          contentEl.textContent = item.content;

          var metaEl = document.createElement("div");
          metaEl.className = "meal-memory-meta";
          metaEl.textContent = (item.kcal ? item.kcal + "kcal" : "kcal未設定") + " ・ 使用 " + item.count + "回";

          var actionsEl = document.createElement("div");
          actionsEl.className = "meal-memory-item-actions";

          var editButton = document.createElement("button");
          editButton.type = "button";
          editButton.className = "secondary button-small";
          editButton.textContent = "編集";
          editButton.addEventListener("click", function () {
            startMealMemoryEdit(item.id);
          });

          var deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "danger button-small";
          deleteButton.textContent = "削除";
          deleteButton.addEventListener("click", function () {
            if (!window.confirm("この候補を削除しますか？")) {
              return;
            }
            if (editingMealMemoryId === item.id) {
              stopMealMemoryEdit();
            }
            deleteMealMemory(item.id);
            renderMealMemoryList();
            refreshMealCandidateSelects();
            setStatus("よく使う食事を削除しました");
          });

          actionsEl.appendChild(editButton);
          actionsEl.appendChild(deleteButton);
          card.appendChild(contentEl);
          card.appendChild(metaEl);
          card.appendChild(actionsEl);
          mealMemoryListEl.appendChild(card);
        });
      }

      function createMealRow(mealKey, rowIndex, item) {
        var row = document.createElement("div");
        row.className = "meal-row";

        var pickerWrap = document.createElement("div");
        pickerWrap.className = "meal-row-picker";

        var pickerToggle = document.createElement("button");
        pickerToggle.type = "button";
        pickerToggle.className = "meal-row-picker-toggle";
        pickerToggle.setAttribute("aria-label", mealKey + " 候補を開く " + (rowIndex + 1));

        var pickerPanel = document.createElement("div");
        pickerPanel.className = "meal-row-picker-panel";
        pickerPanel.hidden = true;

        var candidateSelect = document.createElement("select");
        candidateSelect.className = "meal-candidate-select";
        candidateSelect.setAttribute("data-meal-key", mealKey);
        candidateSelect.setAttribute("data-row-index", String(rowIndex));
        candidateSelect.setAttribute("aria-label", mealKey + " 候補 " + (rowIndex + 1));
        populateMealCandidateSelect(candidateSelect, item.content);

        var contentInput = document.createElement("input");
        contentInput.type = "text";
        contentInput.value = item.content;
        contentInput.placeholder = "内容";
        contentInput.setAttribute("aria-label", mealKey + " 内容 " + (rowIndex + 1));

        var kcalInput = document.createElement("input");
        kcalInput.type = "text";
        kcalInput.inputMode = "decimal";
        kcalInput.value = item.kcal;
        kcalInput.placeholder = "kcal";
        kcalInput.setAttribute("aria-label", mealKey + " kcal " + (rowIndex + 1));

        var removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "meal-remove-row";
        removeButton.textContent = "−";
        removeButton.setAttribute("aria-label", mealKey + " 行削除 " + (rowIndex + 1));

        var mainRow = document.createElement("div");
        mainRow.className = "meal-row-actions";

        contentInput.addEventListener("input", function () {
          state.meals[mealKey][rowIndex].content = contentInput.value;
          saveState();
          populateMealCandidateSelect(candidateSelect, contentInput.value);
        });

        kcalInput.addEventListener("input", function () {
          state.meals[mealKey][rowIndex].kcal = kcalInput.value;
          updateTotalKcal();
          saveState();
          populateMealCandidateSelect(candidateSelect, contentInput.value);
        });

        function commitCurrentMeal() {
          syncMealMemoryFromRow(mealKey, rowIndex, { increment: true });
          renderMealMemoryList();
          refreshMealCandidateSelects();
        }

        function setPickerOpen(isOpen) {
          pickerPanel.hidden = !isOpen;
          if (isOpen) {
            pickerToggle.classList.add("is-open");
            pickerToggle.setAttribute("aria-label", mealKey + " 候補を閉じる " + (rowIndex + 1));
          } else {
            pickerToggle.classList.remove("is-open");
            pickerToggle.setAttribute("aria-label", mealKey + " 候補を開く " + (rowIndex + 1));
          }
        }

        function openCandidatePicker() {
          if (typeof candidateSelect.showPicker === "function") {
            try {
              candidateSelect.showPicker();
              return;
            } catch (error) {
            }
          }

          candidateSelect.focus();

          window.setTimeout(function () {
            try {
              candidateSelect.click();
            } catch (error) {
            }
          }, 0);
        }

        contentInput.addEventListener("blur", commitCurrentMeal);
        contentInput.addEventListener("change", commitCurrentMeal);
        kcalInput.addEventListener("blur", commitCurrentMeal);
        kcalInput.addEventListener("change", commitCurrentMeal);

        pickerToggle.addEventListener("click", function () {
          setPickerOpen(pickerPanel.hidden);
          if (!pickerPanel.hidden) {
            openCandidatePicker();
          }
        });

        candidateSelect.addEventListener("change", function () {
          var selected = findMealMemoryById(candidateSelect.value);
          var token = getMealRowToken(mealKey, rowIndex);
          if (!selected) {
            setPickerOpen(false);
            return;
          }

          state.meals[mealKey][rowIndex].content = selected.content;
          state.meals[mealKey][rowIndex].kcal = selected.kcal;
          contentInput.value = selected.content;
          kcalInput.value = selected.kcal;
          mealCommitMap[token] = getMealRowSignature(selected.content, selected.kcal);
          upsertMealMemory(selected.content, selected.kcal, { increment: true });
          updateTotalKcal();
          saveState();
          renderMealMemoryList();
          refreshMealCandidateSelects();
          setPickerOpen(false);
        });

        candidateSelect.addEventListener("blur", function () {
          window.setTimeout(function () {
            if (document.activeElement !== pickerToggle) {
              setPickerOpen(false);
            }
          }, 120);
        });

        removeButton.addEventListener("click", function () {
          var token = getMealRowToken(mealKey, rowIndex);

          state.meals[mealKey].splice(rowIndex, 1);
          delete mealCommitMap[token];

          if (!state.meals[mealKey].length) {
            state.meals[mealKey].push(createEmptyMealItem());
          }

          saveState();
          renderMeals();
          updateTotalKcal();
        });

        pickerPanel.appendChild(candidateSelect);
        pickerWrap.appendChild(pickerToggle);
        pickerWrap.appendChild(pickerPanel);
        mainRow.appendChild(contentInput);
        mainRow.appendChild(kcalInput);
        mainRow.appendChild(removeButton);
        row.appendChild(pickerWrap);
        row.appendChild(mainRow);
        return row;
      }

      function renderMeals() {
        state.meals = pruneTargetedMealBlanks(state.meals);
        mealsRoot.innerHTML = "";
        mealConfig.forEach(function (meal) {
          var block = document.createElement("section");
          block.className = "meal-block";
          block.classList.add("meal-block-" + meal.key);

          var head = document.createElement("div");
          head.className = "meal-head";

          var title = document.createElement("div");
          title.className = "subsection-title";
          title.textContent = meal.label;

          var note = document.createElement("div");
          note.className = "meal-note";
          note.textContent = "左: 内容 / 右: kcal";

          head.appendChild(title);
          head.appendChild(note);

          var list = document.createElement("div");
          list.className = "meal-list";

          state.meals[meal.key].forEach(function (item, index) {
            list.appendChild(createMealRow(meal.key, index, item));
          });

          var addRowButton = document.createElement("button");
          addRowButton.type = "button";
          addRowButton.className = "meal-add-row";
          addRowButton.textContent = "＋ 1行追加";
          addRowButton.addEventListener("click", function () {
            state.meals[meal.key].push(createEmptyMealItem());
            saveState();
            renderMeals();
          });

          block.appendChild(head);
          block.appendChild(list);
          block.appendChild(addRowButton);
          mealsRoot.appendChild(block);
        });
      }

      function formatWeightLabel(dateText, period) {
        var date = parseDateInput(dateText);
        var label = normalizePeriod(period);

        if (!date) {
          return label;
        }

        return String(date.getDate()) + label;
      }

      function buildWeightText() {
        var parts = [];
        var firstValue = state.weight0Value.trim();
        var firstLabel = formatWeightLabel(state.weight0Date, state.weight0Period);
        var secondValue = state.weight1Value.trim();
        var secondLabel = formatWeightLabel(state.weight1Date, state.weight1Period);

        if (firstValue) {
          parts.push(firstValue + (firstLabel ? "(" + firstLabel + ")" : ""));
        }
        if (secondValue) {
          parts.push(secondValue + (secondLabel ? "(" + secondLabel + ")" : ""));
        }

        return parts.join("");
      }

      function collectMealLines(mealKey) {
        return state.meals[mealKey]
          .filter(function (item) {
            return item.content.trim() || item.kcal.trim();
          })
          .map(function (item) {
            var content = item.content.trim();
            var kcal = item.kcal.trim() || "0";
            return "・" + content + " " + kcal + "kcal";
          });
      }

      function generateText() {
        var total = updateTotalKcal();
        var recordDateText = formatDateWithWeekday(state.date) || state.date.trim();
        var lines = [
          "日付:" + recordDateText,
          "身長(cm):" + state.height.trim(),
          "体重(kg)：" + buildWeightText(),
          "",
          "食事:",
          "",
          "<朝>"
        ];

        lines = lines.concat(collectMealLines("breakfast"));
        lines.push("");
        lines.push("<昼>");
        lines = lines.concat(collectMealLines("lunch"));
        lines.push("");
        lines.push("<夜>");
        lines = lines.concat(collectMealLines("dinner"));
        lines.push("");
        lines.push("合計　" + total + " kcal");
        lines.push("");
        lines.push("運動と活動:");
        lines.push("・通勤：" + state.commute.trim());
        lines.push("・運動した内容：" + state.exercise.trim());

        state.outputText = lines.join("\n");
        outputEl.value = state.outputText;
        saveState();
        setStatus("テキストを生成しました");
      }

      function copyText() {
        var text = outputEl.value;
        if (!text) {
          generateText();
          text = outputEl.value;
        }

        function fallbackCopy() {
          outputEl.removeAttribute("readonly");
          outputEl.focus();
          outputEl.select();
          outputEl.setSelectionRange(0, outputEl.value.length);
          var ok = false;
          try {
            ok = document.execCommand("copy");
          } catch (error) {
            ok = false;
          }
          outputEl.setAttribute("readonly", "readonly");
          setStatus(ok ? "コピーしました" : "コピーに失敗しました");
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            setStatus("コピーしました");
          }).catch(function () {
            fallbackCopy();
          });
        } else {
          fallbackCopy();
        }
      }

      function restoreOutput() {
        outputEl.value = state.outputText || "";
      }

      renderMeals();
      renderMealMemoryList();
      bindSimpleFields();
      updateWeightFieldInputs();
      restoreOutput();
      updateTotalKcal();

      document.getElementById("generate-button").addEventListener("click", generateText);
      document.getElementById("copy-button").addEventListener("click", copyText);
      document.getElementById("meal-memory-save").addEventListener("click", saveMealMemoryEdit);
      document.getElementById("meal-memory-cancel").addEventListener("click", stopMealMemoryEdit);
    })();
  </script>
</body>
</html>
