<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>体重・食事・運動記録</title>
  <style>
    :root {
      --bg: #f6f1e7;
      --panel: rgba(255, 252, 246, 0.96);
      --line: #d7c8ae;
      --text: #2f2419;
      --sub: #6d5a48;
      --accent: #b85c38;
      --accent-strong: #924525;
      --soft: #efe3d0;
      --shadow: 0 10px 30px rgba(95, 64, 34, 0.12);
      --radius: 18px;
      --field-radius: 12px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 240, 214, 0.85), transparent 34%),
        linear-gradient(180deg, #f8f2e8 0%, #f2ebdf 100%);
    }

    body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      line-height: 1.45;
      padding: env(safe-area-inset-top) 14px calc(28px + env(safe-area-inset-bottom));
    }

    .app {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .hero {
      padding: 20px 18px 16px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255, 250, 239, 0.96), rgba(247, 236, 220, 0.96)),
        var(--panel);
      box-shadow: var(--shadow);
      border: 1px solid rgba(215, 200, 174, 0.8);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.5rem;
      letter-spacing: 0.02em;
    }

    .intro {
      margin: 0;
      color: var(--sub);
      font-size: 0.95rem;
    }

    .section {
      margin-top: 14px;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      border: 1px solid rgba(215, 200, 174, 0.75);
      backdrop-filter: blur(6px);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 1.08rem;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid.basic {
      grid-template-columns: 1fr;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label,
    .subsection-title,
    .row-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--sub);
    }

    .date-note {
      font-size: 0.82rem;
      color: var(--sub);
      min-height: 1.2em;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--field-radius);
      background: #fffdf9;
      color: var(--text);
      padding: 12px;
      appearance: none;
      -webkit-appearance: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(184, 92, 56, 0.14);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input[readonly] {
      background: #f6efe3;
      color: var(--accent-strong);
      font-weight: 700;
    }

    .weight-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .weight-label-group {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      gap: 8px;
    }

    .meal-block + .meal-block {
      margin-top: 18px;
    }

    .meal-block {
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(215, 200, 174, 0.72);
      background: rgba(255, 251, 244, 0.72);
    }

    .meal-block-breakfast {
      background: linear-gradient(180deg, rgba(255, 248, 235, 0.96), rgba(255, 252, 246, 0.82));
    }

    .meal-block-lunch {
      background: linear-gradient(180deg, rgba(247, 242, 229, 0.96), rgba(255, 252, 246, 0.82));
    }

    .meal-block-dinner {
      background: linear-gradient(180deg, rgba(242, 236, 228, 0.96), rgba(255, 252, 246, 0.82));
    }

    .meal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(215, 200, 174, 0.72);
    }

    .meal-note {
      font-size: 0.82rem;
      color: var(--sub);
    }

    .meal-list {
      display: grid;
      gap: 10px;
    }

    .meal-row {
      display: grid;
      gap: 8px;
      align-items: start;
    }

    .meal-row-picker {
      display: grid;
      gap: 4px;
      justify-items: start;
    }

    .meal-row-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px 44px;
      gap: 8px;
      align-items: start;
    }

    .meal-row-picker-toggle {
      min-height: 36px;
      width: 36px;
      padding: 0;
      border-radius: 999px;
      border: 1px solid rgba(215, 200, 174, 0.9);
      background: rgba(255, 253, 249, 0.85);
      color: var(--sub);
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: none;
    }

    .meal-row-picker-toggle::before {
      content: "+";
      display: block;
      line-height: 1;
      font-size: 1rem;
    }

    .meal-row-picker-toggle.is-open {
      background: var(--soft);
      color: var(--accent-strong);
      border-color: rgba(184, 92, 56, 0.35);
    }

    .meal-row-picker-toggle.is-open::before {
      content: "×";
    }

    .meal-row-picker-panel {
      width: 100%;
    }

    .meal-row-picker-panel[hidden] {
      display: none;
    }

    .meal-candidate-select {
      padding: 8px 12px;
      min-height: 38px;
      font-size: 0.88rem;
      color: var(--sub);
      background: rgba(255, 253, 249, 0.72);
      border-color: rgba(215, 200, 174, 0.72);
      box-shadow: none;
    }

    .meal-add-row {
      margin-top: 10px;
      width: 100%;
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px dashed rgba(184, 92, 56, 0.38);
      background: rgba(255, 249, 241, 0.72);
      color: var(--accent-strong);
      box-shadow: none;
    }

    .meal-remove-row {
      min-height: 44px;
      width: 44px;
      padding: 0;
      border-radius: 12px;
      border: 1px solid rgba(184, 92, 56, 0.28);
      background: #fff1eb;
      color: #a14425;
      box-shadow: none;
      font-size: 1rem;
      line-height: 1;
    }

    .meal-memory-panel {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 249, 241, 0.9);
      border: 1px solid rgba(215, 200, 174, 0.9);
    }

    .meal-memory-title {
      margin: 0 0 4px;
      font-size: 0.96rem;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .meal-memory-copy {
      margin: 0 0 12px;
      font-size: 0.84rem;
      color: var(--sub);
    }

    .meal-memory-editor {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fffdf8;
      border: 1px solid var(--line);
    }

    .meal-memory-editor[hidden] {
      display: none;
    }

    .meal-memory-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .meal-memory-list {
      display: grid;
      gap: 8px;
    }

    .meal-memory-empty {
      padding: 12px;
      border-radius: 12px;
      background: rgba(239, 227, 208, 0.7);
      color: var(--sub);
      font-size: 0.84rem;
    }

    .meal-memory-item {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 14px;
      background: #fffdf9;
      border: 1px solid rgba(215, 200, 174, 0.9);
    }

    .meal-memory-content {
      font-weight: 700;
      word-break: break-word;
    }

    .meal-memory-meta {
      font-size: 0.8rem;
      color: var(--sub);
    }

    .meal-memory-item-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .total-wrap {
      margin-top: 18px;
      padding: 12px;
      border-radius: 14px;
      background: var(--soft);
    }

    .actions {
      margin-top: 18px;
      padding-top: 4px;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
    }

    .button-small {
      min-height: 42px;
      padding: 11px 12px;
      border-radius: 12px;
    }

    .primary {
      background: linear-gradient(135deg, #c86d45, #a74f2e);
      color: #fff;
      box-shadow: 0 10px 18px rgba(167, 79, 46, 0.22);
    }

    .secondary {
      background: #fff9f1;
      color: var(--accent-strong);
      border: 1px solid var(--line);
    }

    .danger {
      background: #fff1eb;
      color: #a14425;
      border: 1px solid rgba(184, 92, 56, 0.28);
    }

    .status {
      margin-top: 10px;
      min-height: 1.2em;
      color: var(--sub);
      font-size: 0.88rem;
    }

    .output {
      margin-top: 12px;
    }

    .output textarea {
      min-height: 280px;
      white-space: pre-wrap;
    }

    @media (min-width: 640px) {
      body {
        padding-left: 18px;
        padding-right: 18px;
      }

      .grid.basic {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .weight-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>毎日の記録</h1>
      <p class="intro">日付・体重・食事・運動をそのまま埋めて、最後に完成文をコピーできます。</p>
    </section>

    <section class="section">
      <h2 class="section-title">基本項目</h2>
      <div class="grid basic">
        <div class="field">
          <label for="record-date">日付</label>
          <input id="record-date" data-key="date" type="date" inputmode="numeric">
          <div class="date-note" id="record-date-note"></div>
        </div>
        <div class="field">
          <label for="height">身長(cm)</label>
          <input id="height" data-key="height" type="text" inputmode="decimal" placeholder="172">
        </div>
        <div class="field full">
          <div class="row-label">体重(kg)</div>
          <div class="weight-grid">
            <input data-key="weight0Value" type="text" inputmode="decimal" placeholder="63.5" aria-label="体重1 数値">
            <div class="weight-label-group">
              <div class="field">
                <input id="weight0-date" data-key="weight0Date" type="date" inputmode="numeric" aria-label="体重1 日付">
                <div class="date-note" id="weight0-date-note"></div>
              </div>
              <select id="weight0-period" data-key="weight0Period" aria-label="体重1 時間帯">
                <option value="朝">朝</option>
                <option value="昼">昼</option>
              </select>
            </div>
            <input data-key="weight1Value" type="text" inputmode="decimal" placeholder="63.5" aria-label="体重2 数値">
            <div class="weight-label-group">
              <div class="field">
                <input id="weight1-date" data-key="weight1Date" type="date" inputmode="numeric" aria-label="体重2 日付">
                <div class="date-note" id="weight1-date-note"></div>
              </div>
              <select id="weight1-period" data-key="weight1Period" aria-label="体重2 時間帯">
                <option value="朝">朝</option>
                <option value="昼">昼</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">食事</h2>
      <div id="meals-root"></div>
      <div class="total-wrap">
        <div class="field">
          <label for="total-kcal">kcal合計</label>
          <input id="total-kcal" type="text" readonly value="0">
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">運動と活動</h2>
      <div class="grid">
        <div class="field">
          <label for="commute">通勤</label>
          <input id="commute" data-key="commute" type="text">
        </div>
        <div class="field">
          <label for="exercise">運動した内容</label>
          <textarea id="exercise" data-key="exercise"></textarea>
        </div>
      </div>
    </section>

    <section class="actions">
      <div class="button-row">
        <button class="primary" id="generate-button" type="button">テキスト生成</button>
        <button class="secondary" id="copy-button" type="button">コピー</button>
      </div>
      <div class="status" id="status"></div>
      <div class="output">
        <div class="field">
          <label for="output-text">完成テキスト</label>
          <textarea id="output-text" readonly></textarea>
        </div>
      </div>
      <div class="meal-memory-panel">
        <div class="meal-memory-title">よく使う食事</div>
        <p class="meal-memory-copy">入力した内容は自動保存され、使用回数が多い順に候補へ出ます。</p>
        <div class="meal-memory-editor" id="meal-memory-editor" hidden>
          <div class="field">
            <label for="meal-memory-content">食事内容を編集</label>
            <input id="meal-memory-content" type="text" placeholder="例: 納豆ごはん">
          </div>
          <div class="field">
            <label for="meal-memory-kcal">kcal</label>
            <input id="meal-memory-kcal" type="text" inputmode="decimal" placeholder="例: 320">
          </div>
          <div class="meal-memory-actions">
            <button class="primary button-small" id="meal-memory-save" type="button">保存</button>
            <button class="secondary button-small" id="meal-memory-cancel" type="button">キャンセル</button>
          </div>
        </div>
        <div class="meal-memory-list" id="meal-memory-list"></div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var STORAGE_KEYS = {
        state: "bodyWeightRecordApp_v1",
        history: "bodyWeightRecordHistory_v1",
        mealMemory: "bodyWeightMealMemory_v1",
        mealDays: "bodyWeightMealDayHistory_v1"
      };
      var JST_TIME_ZONE = "Asia/Tokyo";
      var DATE_SWITCH_HOUR = 13;
      var MAX_MEAL_CANDIDATES = 50;
      var EMPTY_MEAL = { content: "", kcal: "" };
      var MEAL_CONFIG = [
        { key: "breakfast", label: "朝" },
        { key: "lunch", label: "昼" },
        { key: "dinner", label: "夜" }
      ];
      var DEFAULT_STATE = {
        date: "",
        height: "172",
        weight0Value: "",
        weight0Date: "",
        weight0Period: "朝",
        weight0Label: "",
        weight1Value: "",
        weight1Date: "",
        weight1Period: "朝",
        weight1Label: "",
        commute: "4km(通勤往復)+7階まで階段",
        exercise: "クランチ200回+スクワット20回+5kgダンベル×２個を100回(色んな上げ方)+ストレッチ数分",
        outputText: "",
        meals: {
          breakfast: [
            { content: "核酸25ml", kcal: "20" },
            { content: "ソイプロテイン10g水150ccきな粉5g＋緑茶10cc蜂蜜20gごま10gクエン酸5cc重曹1ccシナモン少々", kcal: "180" },
            { content: "かぼちゃ", kcal: "30" },
            { content: "玉ねぎと温玉と納豆とめかぶと木綿豆腐のサラダに玉ねぎポン酢", kcal: "300" },
            { content: "", kcal: "" },
            { content: "チョコクロワッサン", kcal: "340" }
          ],
          lunch: [
            { content: "水550ml", kcal: "0" },
            { content: "", kcal: "" }
          ],
          dinner: [
            { content: "核酸25ml", kcal: "20" },
            { content: "ミニトマト", kcal: "30" },
            { content: "刺身：", kcal: "165" },
            { content: "スープ：", kcal: "105" },
            { content: "サラダ：大根、きゅうり、紫キャベツ、人参、水菜、めかぶ", kcal: "30" },
            { content: "", kcal: "" },
            { content: "", kcal: "" },
            { content: "りんご", kcal: "75" },
            { content: "あったかい麦茶200ml×2", kcal: "0" }
          ]
        }
      };

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      function createEmptyMeal() {
        return clone(EMPTY_MEAL);
      }

      function normalizeMealItem(item) {
        if (!item || typeof item !== "object") {
          return createEmptyMeal();
        }

        return {
          content: typeof item.content === "string" ? item.content : "",
          kcal: typeof item.kcal === "string" ? item.kcal : ""
        };
      }

      function normalizeMeals(meals, fallbackMeals) {
        var defaults = fallbackMeals || DEFAULT_STATE.meals;
        var nextMeals = {};

        MEAL_CONFIG.forEach(function (meal) {
          var source = meals && Array.isArray(meals[meal.key]) ? meals[meal.key] : defaults[meal.key];
          nextMeals[meal.key] = source.map(normalizeMealItem);
          if (!nextMeals[meal.key].length) {
            nextMeals[meal.key].push(createEmptyMeal());
          }
        });

        return nextMeals;
      }

      function normalizeMealContent(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function normalizeMealKcal(value) {
        return String(value || "").trim();
      }

      function hasMealValue(item) {
        return Boolean(normalizeMealContent(item.content) || normalizeMealKcal(item.kcal));
      }

      function hasAnyMealContent(meals) {
        return MEAL_CONFIG.some(function (meal) {
          return (meals && meals[meal.key] || []).some(hasMealValue);
        });
      }

      function loadJson(key, fallbackValue) {
        try {
          var raw = localStorage.getItem(key);
          if (!raw) {
            return clone(fallbackValue);
          }

          var parsed = JSON.parse(raw);
          if (Array.isArray(fallbackValue)) {
            return Array.isArray(parsed) ? parsed : clone(fallbackValue);
          }
          if (fallbackValue && typeof fallbackValue === "object") {
            return parsed && typeof parsed === "object" ? parsed : clone(fallbackValue);
          }
          return parsed;
        } catch (error) {
          return clone(fallbackValue);
        }
      }

      function getJstParts(baseDate) {
        var formatter = new Intl.DateTimeFormat("ja-JP", {
          timeZone: JST_TIME_ZONE,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          weekday: "short"
        });
        var map = {};

        formatter.formatToParts(baseDate || new Date()).forEach(function (part) {
          if (part.type !== "literal") {
            map[part.type] = part.value;
          }
        });

        return map;
      }

      function parseDateInput(value) {
        var match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
        var date;

        if (!match) {
          return null;
        }

        date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
        if (
          date.getFullYear() !== Number(match[1]) ||
          date.getMonth() !== Number(match[2]) - 1 ||
          date.getDate() !== Number(match[3])
        ) {
          return null;
        }

        return date;
      }

      function formatDateInput(date) {
        if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
          return "";
        }

        return [
          date.getFullYear(),
          pad2(date.getMonth() + 1),
          pad2(date.getDate())
        ].join("-");
      }

      function addDays(dateText, days) {
        var date = parseDateInput(dateText);
        if (!date) {
          return "";
        }
        date.setDate(date.getDate() + days);
        return formatDateInput(date);
      }

      function formatDateWithWeekday(dateText) {
        var date = parseDateInput(dateText);
        var weekdayLabels = ["日", "月", "火", "水", "木", "金", "土"];

        if (!date) {
          return "";
        }

        return [
          date.getFullYear(),
          "/",
          pad2(date.getMonth() + 1),
          "/",
          pad2(date.getDate()),
          "(",
          weekdayLabels[date.getDay()],
          ")"
        ].join("");
      }

      function getAppTodayInputValue() {
        var parts = getJstParts(new Date());
        var hour = Number(parts.hour || "0");
        var date = new Date(Number(parts.year), Number(parts.month) - 1, Number(parts.day));

        if (hour < DATE_SWITCH_HOUR) {
          date.setDate(date.getDate() - 1);
        }

        return formatDateInput(date);
      }

      function normalizePeriod(value) {
        return value === "昼" ? "昼" : "朝";
      }

      function inferWeightDate(label, fallbackDate) {
        var match = String(label || "").trim().match(/^(\d{1,2})(朝|昼)$/);
        var base;
        var day;
        var candidate;

        if (!match) {
          return fallbackDate;
        }

        base = parseDateInput(fallbackDate);
        if (!base) {
          return fallbackDate;
        }

        day = Number(match[1]);
        candidate = new Date(base.getFullYear(), base.getMonth(), day);
        if (candidate.getDate() !== day) {
          return fallbackDate;
        }

        if (day < base.getDate() - 15) {
          candidate = new Date(base.getFullYear(), base.getMonth() + 1, day);
        } else if (day > base.getDate() + 15) {
          candidate = new Date(base.getFullYear(), base.getMonth() - 1, day);
        }

        return formatDateInput(candidate);
      }

      function inferWeightPeriod(label, fallbackPeriod) {
        var trimmed = String(label || "").trim();
        if (/昼$/.test(trimmed)) {
          return "昼";
        }
        if (/朝$/.test(trimmed)) {
          return "朝";
        }
        return normalizePeriod(fallbackPeriod);
      }

      function formatWeightLabel(dateText, period) {
        var date = parseDateInput(dateText);
        if (!date) {
          return normalizePeriod(period);
        }
        return String(date.getDate()) + normalizePeriod(period);
      }

      function mergeState(base, saved) {
        var merged = clone(base);

        if (!saved || typeof saved !== "object") {
          merged.meals = normalizeMeals(base.meals);
          return merged;
        }

        Object.keys(merged).forEach(function (key) {
          if (key !== "meals" && typeof saved[key] === "string") {
            merged[key] = saved[key];
          }
        });

        merged.meals = normalizeMeals(saved.meals, base.meals);
        return merged;
      }

      function loadState() {
        return mergeState(DEFAULT_STATE, loadJson(STORAGE_KEYS.state, DEFAULT_STATE));
      }

      function sortMealMemory(a, b) {
        if ((b.count || 0) !== (a.count || 0)) {
          return (b.count || 0) - (a.count || 0);
        }
        if ((b.updatedAt || 0) !== (a.updatedAt || 0)) {
          return (b.updatedAt || 0) - (a.updatedAt || 0);
        }
        return a.content.localeCompare(b.content, "ja");
      }

      function createMealMemoryEntry(content, kcal) {
        return {
          id: "meal_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
          content: normalizeMealContent(content),
          kcal: normalizeMealKcal(kcal),
          count: 1,
          updatedAt: Date.now()
        };
      }

      function loadMealMemory() {
        var rawList = loadJson(STORAGE_KEYS.mealMemory, []);
        var mergedMap = {};

        rawList.forEach(function (item) {
          var content = normalizeMealContent(item && item.content);
          var current;

          if (!content) {
            return;
          }

          current = mergedMap[content] || {
            id: typeof item.id === "string" && item.id ? item.id : createMealMemoryEntry(content, item.kcal).id,
            content: content,
            kcal: normalizeMealKcal(item.kcal),
            count: 0,
            updatedAt: 0
          };

          current.count += Math.max(1, Number(item.count) || 1);
          if ((Number(item.updatedAt) || 0) >= current.updatedAt) {
            current.kcal = normalizeMealKcal(item.kcal);
            current.updatedAt = Number(item.updatedAt) || Date.now();
          }
          mergedMap[content] = current;
        });

        return Object.keys(mergedMap).map(function (key) {
          return mergedMap[key];
        }).sort(sortMealMemory);
      }

      var state = loadState();
      var history = loadJson(STORAGE_KEYS.history, {});
      var mealDayHistory = loadJson(STORAGE_KEYS.mealDays, {});
      var mealMemory = loadMealMemory();
      var editingMealMemoryId = "";
      var mealCommitMap = {};

      var statusEl = document.getElementById("status");
      var mealsRoot = document.getElementById("meals-root");
      var totalKcalEl = document.getElementById("total-kcal");
      var outputEl = document.getElementById("output-text");
      var mealMemoryListEl = document.getElementById("meal-memory-list");
      var mealMemoryEditorEl = document.getElementById("meal-memory-editor");
      var mealMemoryContentEl = document.getElementById("meal-memory-content");
      var mealMemoryKcalEl = document.getElementById("meal-memory-kcal");

      function setStatus(message) {
        statusEl.textContent = message || "";
      }

      function syncDerivedWeightLabels() {
        state.weight0Label = formatWeightLabel(state.weight0Date, state.weight0Period);
        state.weight1Label = formatWeightLabel(state.weight1Date, state.weight1Period);
      }

      function ensureWeightFields() {
        state.weight0Date = state.weight0Date || inferWeightDate(state.weight0Label, state.date);
        state.weight0Period = inferWeightPeriod(state.weight0Label, state.weight0Period || "朝");
        state.weight1Date = state.weight1Date || inferWeightDate(state.weight1Label, addDays(state.date, 1) || state.date);
        state.weight1Period = inferWeightPeriod(state.weight1Label, state.weight1Period || "朝");
        syncDerivedWeightLabels();
      }

      function saveHistory() {
        if (!state.date) {
          return;
        }

        history[state.date] = {
          weight0Value: state.weight0Value,
          weight0Date: state.weight0Date,
          weight0Period: state.weight0Period,
          weight1Value: state.weight1Value,
          weight1Date: state.weight1Date,
          weight1Period: state.weight1Period
        };
        localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(history));
      }

      function saveMealDayHistory() {
        if (!state.date) {
          return;
        }

        mealDayHistory[state.date] = normalizeMeals(state.meals);
        localStorage.setItem(STORAGE_KEYS.mealDays, JSON.stringify(mealDayHistory));
      }

      function saveMealMemory() {
        localStorage.setItem(STORAGE_KEYS.mealMemory, JSON.stringify(mealMemory.slice().sort(sortMealMemory)));
      }

      function saveState(statusMessage) {
        syncDerivedWeightLabels();
        localStorage.setItem(STORAGE_KEYS.state, JSON.stringify(state));
        saveHistory();
        saveMealDayHistory();
        setStatus(statusMessage || "自動保存しました");
      }

      function findPreviousWeightValue(targetDate) {
        var previousRecord = history[addDays(targetDate, -1)];

        if (previousRecord && previousRecord.weight1Date === targetDate && String(previousRecord.weight1Value || "").trim()) {
          return previousRecord.weight1Value;
        }
        if (previousRecord && previousRecord.weight0Date === targetDate && String(previousRecord.weight0Value || "").trim()) {
          return previousRecord.weight0Value;
        }
        return "";
      }

      function getCarryOverMeals(targetDate, previousStateDate, previousMeals) {
        var previousDate = addDays(targetDate, -1);
        var savedMeals = mealDayHistory[previousDate];

        if (previousStateDate === previousDate && hasAnyMealContent(previousMeals)) {
          return normalizeMeals(previousMeals);
        }
        if (savedMeals && hasAnyMealContent(savedMeals)) {
          return normalizeMeals(savedMeals);
        }
        return normalizeMeals(DEFAULT_STATE.meals);
      }

      function applyAutoDatesAndWeights() {
        var appToday = getAppTodayInputValue();
        var tomorrow = addDays(appToday, 1);
        var previousDate = state.date;
        var previousMeals = clone(state.meals);

        if (!state.date || state.date !== appToday) {
          state.date = appToday;
          state.weight0Date = appToday;
          state.weight1Date = tomorrow;
          state.weight0Period = "朝";
          state.weight1Period = "朝";
          state.weight0Value = findPreviousWeightValue(appToday);
          state.weight1Value = "";
          state.outputText = "";
          state.meals = getCarryOverMeals(appToday, previousDate, previousMeals);
        } else {
          state.weight0Date = state.weight0Date || appToday;
          state.weight1Date = state.weight1Date || tomorrow;
          if (!String(state.weight0Value || "").trim()) {
            state.weight0Value = findPreviousWeightValue(appToday);
          }
        }

        ensureWeightFields();
      }

      function parseKcal(value) {
        var text = String(value || "").trim();
        var match;

        if (!text) {
          return 0;
        }

        match = text.match(/-?\d+(\.\d+)?/);
        return match ? Number(match[0]) : 0;
      }

      function updateTotalKcal() {
        var total = 0;

        MEAL_CONFIG.forEach(function (meal) {
          state.meals[meal.key].forEach(function (item) {
            total += parseKcal(item.kcal);
          });
        });

        totalKcalEl.value = String(total);
        return String(total);
      }

      function updateDateNotes() {
        [
          { id: "record-date-note", value: state.date },
          { id: "weight0-date-note", value: state.weight0Date },
          { id: "weight1-date-note", value: state.weight1Date }
        ].forEach(function (item) {
          var noteEl = document.getElementById(item.id);
          if (noteEl) {
            noteEl.textContent = formatDateWithWeekday(item.value);
          }
        });
      }

      function updateWeightFieldInputs() {
        var weight0DateEl = document.getElementById("weight0-date");
        var weight1DateEl = document.getElementById("weight1-date");
        var weight0PeriodEl = document.getElementById("weight0-period");
        var weight1PeriodEl = document.getElementById("weight1-period");

        if (weight0DateEl) {
          weight0DateEl.value = state.weight0Date || "";
        }
        if (weight1DateEl) {
          weight1DateEl.value = state.weight1Date || "";
        }
        if (weight0PeriodEl) {
          weight0PeriodEl.value = normalizePeriod(state.weight0Period);
        }
        if (weight1PeriodEl) {
          weight1PeriodEl.value = normalizePeriod(state.weight1Period);
        }

        updateDateNotes();
      }

      function syncWeightDatesWithRecordDate(previousDate, nextDate) {
        var previousNextDate = addDays(previousDate, 1);
        var nextNextDate = addDays(nextDate, 1);

        if (!state.weight0Date || state.weight0Date === previousDate) {
          state.weight0Date = nextDate;
        }
        if (!state.weight1Date || state.weight1Date === previousNextDate) {
          state.weight1Date = nextNextDate || nextDate;
        }

        syncDerivedWeightLabels();
        updateWeightFieldInputs();
      }

      function getMealSignature(item) {
        var content = normalizeMealContent(item.content);
        if (!content) {
          return "";
        }
        return content + "||" + normalizeMealKcal(item.kcal);
      }

      function rebuildMealCommitMap() {
        mealCommitMap = {};
        MEAL_CONFIG.forEach(function (meal) {
          state.meals[meal.key].forEach(function (item, index) {
            mealCommitMap[meal.key + ":" + index] = getMealSignature(item);
          });
        });
      }

      function bindSimpleFields() {
        document.querySelectorAll("[data-key]").forEach(function (node) {
          var key = node.getAttribute("data-key");
          if (!Object.prototype.hasOwnProperty.call(state, key)) {
            return;
          }

          node.value = state[key];
          function handleUpdate() {
            var previousDate = key === "date" ? state.date : "";

            state[key] = node.value;
            if (key === "date") {
              syncWeightDatesWithRecordDate(previousDate, state.date);
              if (!String(state.weight0Value || "").trim()) {
                state.weight0Value = findPreviousWeightValue(state.date);
              }
            }
            if (key === "weight0Period" || key === "weight1Period") {
              state[key] = normalizePeriod(state[key]);
            }

            saveState();
          }

          node.addEventListener("input", handleUpdate);
          node.addEventListener("change", handleUpdate);
        });
      }

      function findMealMemoryById(id) {
        return mealMemory.find(function (item) {
          return item.id === id;
        }) || null;
      }

      function findMealMemoryByContent(content, excludeId) {
        var normalizedContent = normalizeMealContent(content);
        return mealMemory.find(function (item) {
          return item.id !== excludeId && item.content === normalizedContent;
        }) || null;
      }

      function upsertMealMemory(content, kcal, shouldIncrement) {
        var normalizedContent = normalizeMealContent(content);
        var normalizedKcal = normalizeMealKcal(kcal);
        var existing;

        if (!normalizedContent) {
          return null;
        }

        existing = findMealMemoryByContent(normalizedContent);
        if (existing) {
          existing.count = shouldIncrement ? existing.count + 1 : existing.count;
          existing.kcal = normalizedKcal || existing.kcal;
          existing.updatedAt = Date.now();
          saveMealMemory();
          return existing;
        }

        existing = createMealMemoryEntry(normalizedContent, normalizedKcal);
        mealMemory.push(existing);
        saveMealMemory();
        return existing;
      }

      function seedMealMemoryFromCurrentMeals() {
        MEAL_CONFIG.forEach(function (meal) {
          state.meals[meal.key].forEach(function (item) {
            if (normalizeMealContent(item.content)) {
              upsertMealMemory(item.content, item.kcal, false);
            }
          });
        });
      }

      function getMealMemoryOptions() {
        return mealMemory.slice().sort(sortMealMemory);
      }

      function populateMealCandidateSelect(selectEl, currentContent) {
        var options = getMealMemoryOptions().slice(0, MAX_MEAL_CANDIDATES);
        var matched = findMealMemoryByContent(currentContent);
        var matchedInTop = matched && options.some(function (item) {
          return item.id === matched.id;
        });

        selectEl.innerHTML = "";
        selectEl.appendChild(new Option("候補から選択", ""));

        options.forEach(function (item) {
          selectEl.appendChild(new Option(item.content + (item.kcal ? " / " + item.kcal + "kcal" : ""), item.id));
        });

        if (matched && !matchedInTop) {
          selectEl.appendChild(new Option(matched.content + (matched.kcal ? " / " + matched.kcal + "kcal" : ""), matched.id));
        }

        selectEl.value = matched ? matched.id : "";
      }

      function refreshMealCandidateSelects() {
        document.querySelectorAll(".meal-candidate-select").forEach(function (selectEl) {
          var mealKey = selectEl.getAttribute("data-meal-key");
          var rowIndex = Number(selectEl.getAttribute("data-row-index"));
          var item = state.meals[mealKey] && state.meals[mealKey][rowIndex];
          populateMealCandidateSelect(selectEl, item ? item.content : "");
        });
      }

      function syncMealMemoryFromRow(mealKey, rowIndex, shouldIncrement) {
        var item = state.meals[mealKey][rowIndex];
        var token = mealKey + ":" + rowIndex;
        var nextSignature = getMealSignature(item);
        var previousSignature = mealCommitMap[token] || "";
        var increment = Boolean(shouldIncrement && nextSignature && nextSignature !== previousSignature);

        mealCommitMap[token] = nextSignature;
        return upsertMealMemory(item.content, item.kcal, increment);
      }

      function renderMealMemoryList() {
        var items = getMealMemoryOptions().slice(0, MAX_MEAL_CANDIDATES);

        mealMemoryListEl.innerHTML = "";
        if (!items.length) {
          var emptyEl = document.createElement("div");
          emptyEl.className = "meal-memory-empty";
          emptyEl.textContent = "食事内容を入力すると、ここに候補がたまります。";
          mealMemoryListEl.appendChild(emptyEl);
          return;
        }

        items.forEach(function (item) {
          var card = document.createElement("div");
          var contentEl = document.createElement("div");
          var metaEl = document.createElement("div");
          var actionsEl = document.createElement("div");
          var editButton = document.createElement("button");
          var deleteButton = document.createElement("button");

          card.className = "meal-memory-item";
          contentEl.className = "meal-memory-content";
          metaEl.className = "meal-memory-meta";
          actionsEl.className = "meal-memory-item-actions";

          contentEl.textContent = item.content;
          metaEl.textContent = (item.kcal ? item.kcal + "kcal" : "kcal未設定") + " ・ 使用 " + item.count + "回";

          editButton.type = "button";
          editButton.className = "secondary button-small";
          editButton.textContent = "編集";
          editButton.addEventListener("click", function () {
            editingMealMemoryId = item.id;
            mealMemoryContentEl.value = item.content;
            mealMemoryKcalEl.value = item.kcal;
            mealMemoryEditorEl.hidden = false;
            mealMemoryContentEl.focus();
          });

          deleteButton.type = "button";
          deleteButton.className = "danger button-small";
          deleteButton.textContent = "削除";
          deleteButton.addEventListener("click", function () {
            if (!window.confirm("この候補を削除しますか？")) {
              return;
            }

            mealMemory = mealMemory.filter(function (candidate) {
              return candidate.id !== item.id;
            });
            if (editingMealMemoryId === item.id) {
              stopMealMemoryEdit();
            }
            saveMealMemory();
            renderMealMemoryList();
            refreshMealCandidateSelects();
            setStatus("よく使う食事を削除しました");
          });

          actionsEl.appendChild(editButton);
          actionsEl.appendChild(deleteButton);
          card.appendChild(contentEl);
          card.appendChild(metaEl);
          card.appendChild(actionsEl);
          mealMemoryListEl.appendChild(card);
        });
      }

      function stopMealMemoryEdit() {
        editingMealMemoryId = "";
        mealMemoryContentEl.value = "";
        mealMemoryKcalEl.value = "";
        mealMemoryEditorEl.hidden = true;
      }

      function saveMealMemoryEdit() {
        var target = findMealMemoryById(editingMealMemoryId);
        var nextContent = normalizeMealContent(mealMemoryContentEl.value);
        var nextKcal = normalizeMealKcal(mealMemoryKcalEl.value);
        var duplicate;

        if (!target) {
          stopMealMemoryEdit();
          return;
        }
        if (!nextContent) {
          setStatus("食事内容を入力してください");
          mealMemoryContentEl.focus();
          return;
        }

        duplicate = findMealMemoryByContent(nextContent, target.id);
        if (duplicate) {
          duplicate.count += target.count;
          duplicate.kcal = nextKcal || duplicate.kcal;
          duplicate.updatedAt = Date.now();
          mealMemory = mealMemory.filter(function (item) {
            return item.id !== target.id;
          });
        } else {
          target.content = nextContent;
          target.kcal = nextKcal;
          target.updatedAt = Date.now();
        }

        saveMealMemory();
        stopMealMemoryEdit();
        renderMealMemoryList();
        refreshMealCandidateSelects();
        setStatus("よく使う食事を更新しました");
      }

      function openNativePicker(selectEl) {
        if (typeof selectEl.showPicker === "function") {
          try {
            selectEl.showPicker();
            return;
          } catch (error) {
          }
        }

        selectEl.focus();
        window.setTimeout(function () {
          try {
            selectEl.click();
          } catch (error) {
          }
        }, 0);
      }

      function createMealRow(mealKey, rowIndex, item) {
        var row = document.createElement("div");
        var pickerWrap = document.createElement("div");
        var pickerToggle = document.createElement("button");
        var pickerPanel = document.createElement("div");
        var candidateSelect = document.createElement("select");
        var mainRow = document.createElement("div");
        var contentInput = document.createElement("input");
        var kcalInput = document.createElement("input");
        var removeButton = document.createElement("button");

        row.className = "meal-row";
        pickerWrap.className = "meal-row-picker";
        pickerPanel.className = "meal-row-picker-panel";
        pickerPanel.hidden = true;
        mainRow.className = "meal-row-actions";

        pickerToggle.type = "button";
        pickerToggle.className = "meal-row-picker-toggle";
        pickerToggle.setAttribute("aria-label", mealKey + " 候補を開く " + (rowIndex + 1));

        candidateSelect.className = "meal-candidate-select";
        candidateSelect.setAttribute("data-meal-key", mealKey);
        candidateSelect.setAttribute("data-row-index", String(rowIndex));
        candidateSelect.setAttribute("aria-label", mealKey + " 候補 " + (rowIndex + 1));
        populateMealCandidateSelect(candidateSelect, item.content);

        contentInput.type = "text";
        contentInput.value = item.content;
        contentInput.placeholder = "内容";
        contentInput.setAttribute("aria-label", mealKey + " 内容 " + (rowIndex + 1));

        kcalInput.type = "text";
        kcalInput.inputMode = "decimal";
        kcalInput.value = item.kcal;
        kcalInput.placeholder = "kcal";
        kcalInput.setAttribute("aria-label", mealKey + " kcal " + (rowIndex + 1));

        removeButton.type = "button";
        removeButton.className = "meal-remove-row";
        removeButton.textContent = "−";
        removeButton.setAttribute("aria-label", mealKey + " 行削除 " + (rowIndex + 1));

        function setPickerOpen(isOpen) {
          pickerPanel.hidden = !isOpen;
          if (isOpen) {
            pickerToggle.classList.add("is-open");
            pickerToggle.setAttribute("aria-label", mealKey + " 候補を閉じる " + (rowIndex + 1));
          } else {
            pickerToggle.classList.remove("is-open");
            pickerToggle.setAttribute("aria-label", mealKey + " 候補を開く " + (rowIndex + 1));
          }
        }

        function commitCurrentRow() {
          syncMealMemoryFromRow(mealKey, rowIndex, true);
          renderMealMemoryList();
          refreshMealCandidateSelects();
        }

        contentInput.addEventListener("input", function () {
          state.meals[mealKey][rowIndex].content = contentInput.value;
          saveState();
          populateMealCandidateSelect(candidateSelect, contentInput.value);
        });

        kcalInput.addEventListener("input", function () {
          state.meals[mealKey][rowIndex].kcal = kcalInput.value;
          updateTotalKcal();
          saveState();
          populateMealCandidateSelect(candidateSelect, contentInput.value);
        });

        contentInput.addEventListener("blur", commitCurrentRow);
        contentInput.addEventListener("change", commitCurrentRow);
        kcalInput.addEventListener("blur", commitCurrentRow);
        kcalInput.addEventListener("change", commitCurrentRow);

        pickerToggle.addEventListener("click", function () {
          setPickerOpen(pickerPanel.hidden);
          if (!pickerPanel.hidden) {
            openNativePicker(candidateSelect);
          }
        });

        candidateSelect.addEventListener("change", function () {
          var selected = findMealMemoryById(candidateSelect.value);
          var token = mealKey + ":" + rowIndex;

          if (!selected) {
            setPickerOpen(false);
            return;
          }

          state.meals[mealKey][rowIndex].content = selected.content;
          state.meals[mealKey][rowIndex].kcal = selected.kcal;
          contentInput.value = selected.content;
          kcalInput.value = selected.kcal;
          mealCommitMap[token] = getMealSignature(state.meals[mealKey][rowIndex]);
          upsertMealMemory(selected.content, selected.kcal, true);
          updateTotalKcal();
          saveState();
          renderMealMemoryList();
          refreshMealCandidateSelects();
          setPickerOpen(false);
        });

        candidateSelect.addEventListener("blur", function () {
          window.setTimeout(function () {
            if (document.activeElement !== pickerToggle) {
              setPickerOpen(false);
            }
          }, 120);
        });

        removeButton.addEventListener("click", function () {
          state.meals[mealKey].splice(rowIndex, 1);
          if (!state.meals[mealKey].length) {
            state.meals[mealKey].push(createEmptyMeal());
          }
          saveState();
          renderMeals();
          updateTotalKcal();
        });

        pickerPanel.appendChild(candidateSelect);
        pickerWrap.appendChild(pickerToggle);
        pickerWrap.appendChild(pickerPanel);
        mainRow.appendChild(contentInput);
        mainRow.appendChild(kcalInput);
        mainRow.appendChild(removeButton);
        row.appendChild(pickerWrap);
        row.appendChild(mainRow);
        return row;
      }

      function renderMeals() {
        mealsRoot.innerHTML = "";

        MEAL_CONFIG.forEach(function (meal) {
          var block = document.createElement("section");
          var head = document.createElement("div");
          var title = document.createElement("div");
          var note = document.createElement("div");
          var list = document.createElement("div");
          var addRowButton = document.createElement("button");

          block.className = "meal-block meal-block-" + meal.key;
          head.className = "meal-head";
          title.className = "subsection-title";
          note.className = "meal-note";
          list.className = "meal-list";

          title.textContent = meal.label;
          note.textContent = "左: 内容 / 右: kcal";

          state.meals[meal.key].forEach(function (item, index) {
            list.appendChild(createMealRow(meal.key, index, item));
          });

          addRowButton.type = "button";
          addRowButton.className = "meal-add-row";
          addRowButton.textContent = "＋ 1行追加";
          addRowButton.addEventListener("click", function () {
            state.meals[meal.key].push(createEmptyMeal());
            saveState();
            renderMeals();
          });

          head.appendChild(title);
          head.appendChild(note);
          block.appendChild(head);
          block.appendChild(list);
          block.appendChild(addRowButton);
          mealsRoot.appendChild(block);
        });

        rebuildMealCommitMap();
      }

      function buildWeightText() {
        var parts = [];
        var firstValue = state.weight0Value.trim();
        var secondValue = state.weight1Value.trim();

        if (firstValue) {
          parts.push(firstValue + "(" + formatWeightLabel(state.weight0Date, state.weight0Period) + ")");
        }
        if (secondValue) {
          parts.push(secondValue + "(" + formatWeightLabel(state.weight1Date, state.weight1Period) + ")");
        }

        return parts.join("");
      }

      function collectMealLines(mealKey) {
        return state.meals[mealKey].filter(hasMealValue).map(function (item) {
          return "・" + item.content.trim() + " " + (item.kcal.trim() || "0") + "kcal";
        });
      }

      function generateText() {
        var total = updateTotalKcal();
        var lines = [
          "日付:" + (formatDateWithWeekday(state.date) || state.date.trim()),
          "身長(cm):" + state.height.trim(),
          "体重(kg)：" + buildWeightText(),
          "",
          "食事:",
          "",
          "<朝>"
        ];

        lines = lines.concat(collectMealLines("breakfast"));
        lines.push("");
        lines.push("<昼>");
        lines = lines.concat(collectMealLines("lunch"));
        lines.push("");
        lines.push("<夜>");
        lines = lines.concat(collectMealLines("dinner"));
        lines.push("");
        lines.push("合計　" + total + " kcal");
        lines.push("");
        lines.push("運動と活動:");
        lines.push("・通勤：" + state.commute.trim());
        lines.push("・運動した内容：" + state.exercise.trim());

        state.outputText = lines.join("\n");
        outputEl.value = state.outputText;
        saveState("テキストを生成しました");
      }

      function copyText() {
        var text = outputEl.value;

        function fallbackCopy() {
          outputEl.removeAttribute("readonly");
          outputEl.focus();
          outputEl.select();
          outputEl.setSelectionRange(0, outputEl.value.length);
          try {
            document.execCommand("copy");
            setStatus("コピーしました");
          } catch (error) {
            setStatus("コピーに失敗しました");
          }
          outputEl.setAttribute("readonly", "readonly");
        }

        if (!text) {
          generateText();
          text = outputEl.value;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            setStatus("コピーしました");
          }).catch(fallbackCopy);
          return;
        }

        fallbackCopy();
      }

      function restoreOutput() {
        outputEl.value = state.outputText || "";
      }

      applyAutoDatesAndWeights();
      if (!mealMemory.length) {
        seedMealMemoryFromCurrentMeals();
      }

      renderMeals();
      renderMealMemoryList();
      bindSimpleFields();
      updateWeightFieldInputs();
      restoreOutput();
      updateTotalKcal();

      document.getElementById("generate-button").addEventListener("click", generateText);
      document.getElementById("copy-button").addEventListener("click", copyText);
      document.getElementById("meal-memory-save").addEventListener("click", saveMealMemoryEdit);
      document.getElementById("meal-memory-cancel").addEventListener("click", stopMealMemoryEdit);
    })();
  </script>
</body>
</html>
